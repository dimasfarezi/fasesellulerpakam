<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fase Selular Pakam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font untuk gaya Digital dan Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Latar belakang abu-abu sesuai gambar */
            background-color: #b0b0b0; 
            font-family: 'Orbitron', sans-serif;
            color: #333;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        /* Style Header */
        .btn-header {
            background-color: #7a7a7a;
            color: #1a1a1a;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        /* Judul Utama Kuning */
        .judul-emas {
            color: #facc15;
            font-family: 'Kanit', sans-serif;
            font-style: italic;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            line-height: 1;
        }
        /* Kartu Hitam */
        .kartu-stok {
            background-color: #0c0c0c;
            color: white;
            border-radius: 15px;
            padding: 25px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 15px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .label-stok {
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .angka-stok {
            font-size: 2.5rem;
            font-weight: 700;
        }
        /* Panel Admin */
        #admin-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; z-index: 100; padding: 20px; overflow-y: auto; color: white;
        }
    </style>
</head>
<body>

    <!-- Navigasi Atas -->
    <div class="flex justify-between items-start mb-10">
        <button class="btn-header">LOGO</button>
        <div class="text-center">
            <h2 id="clock" class="text-2xl font-bold tracking-widest text-blue-900">00.00.00</h2>
            <p id="date" class="text-[9px] opacity-60 uppercase">MINGGU, 21 JUN 2026</p>
        </div>
        <!-- Klik Login untuk muncul Prompt ID -->
        <button onclick="bukaAksesAdmin()" class="btn-header">LOGIN</button>
    </div>

    <!-- Judul Tengah -->
    <div class="text-center mb-12">
        <h1 class="text-5xl judul-emas uppercase italic">FASE SELULAR</h1>
        <h1 class="text-5xl judul-emas uppercase italic mb-4">PAKAM</h1>
        <p class="text-[10px] tracking-[0.4em] opacity-60 uppercase font-bold">Generasi Peternak Modern</p>
    </div>

    <!-- Area Kartu Data -->
    <div id="data-display" class="space-y-4">
        <p class="text-center italic opacity-40">Memuat data...</p>
    </div>

    <!-- Panel Update Data (Hanya Muncul Jika ID Benar) -->
    <div id="admin-panel">
        <div class="max-w-sm mx-auto pt-10">
            <h2 class="text-yellow-500 font-bold text-center mb-6 uppercase tracking-widest">Update Stok</h2>
            <div class="space-y-2 mb-6">
                <input type="text" id="gh-u" placeholder="Username GitHub" class="w-full p-3 bg-gray-800 rounded text-sm text-white outline-none">
                <input type="text" id="gh-r" placeholder="Repo GitHub" class="w-full p-3 bg-gray-800 rounded text-sm text-white outline-none">
                <input type="password" id="gh-t" placeholder="Token GitHub" class="w-full p-3 bg-gray-800 rounded text-sm text-white outline-none">
            </div>
            <div id="form-edit" class="space-y-4 mb-6 border-t border-white/10 pt-4"></div>
            <button onclick="simpanKeGithub()" id="btn-save" class="w-full bg-yellow-600 p-3 rounded font-bold uppercase text-white">Simpan Perubahan</button>
            <button onclick="tutupAdmin()" class="w-full mt-4 text-[10px] opacity-40 text-white">BATAL</button>
            <p id="status" class="text-center text-xs mt-4"></p>
        </div>
    </div>

<script>
    // --- KONFIGURASI ---
    const ID_RAHASIA = "admin123"; // Ganti ID ini untuk buka menu edit
    // -------------------

    let stokLocal = [];

    // Prompt ID saat klik tombol Login
    function bukaAksesAdmin() {
        let input = prompt("ID:");
        if(input === ID_RAHASIA) {
            document.getElementById('admin-panel').style.display = 'block';
        } else if(input !== null) {
            alert("Akses Ditolak!");
        }
    }

    function tutupAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    // Jam Digital
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB').replace(/:/g, '.');
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short', year:'numeric'}).toUpperCase();
    }, 1000);

    // Ambil Data dari data.json
    async function loadData() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            stokLocal = await res.json();
            
            document.getElementById('data-display').innerHTML = stokLocal.map(item => `
                <div class="kartu-stok">
                    <span class="label-stok uppercase">${item.nama}</span>
                    <span class="angka-stok">${item.nilai}</span>
                </div>
            `).join('');

            document.getElementById('form-edit').innerHTML = stokLocal.map((item, i) => `
                <div>
                    <label class="text-[9px] opacity-40 uppercase mb-1 block">${item.nama}</label>
                    <input type="text" id="val-${i}" value="${item.nilai}" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-sm text-white">
                </div>
            `).join('');
        } catch (e) { 
            document.getElementById('data-display').innerHTML = "<p class='text-center text-red-600'>Gagal muat data.json</p>";
        }
    }

    // Fungsi Simpan ke GitHub
    async function simpanKeGithub() {
        const u = document.getElementById('gh-u').value;
        const r = document.getElementById('gh-r').value;
        const t = document.getElementById('gh-t').value;
        if(!u || !r || !t) return alert("Lengkapi data GitHub!");

        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.innerText = "Proses...";

        try {
            const get = await fetch(`https://api.github.com/repos/${u}/${r}/contents/data.json`);
            const file = await get.json();

            const baru = stokLocal.map((item, i) => ({
                nama: item.nama,
                nilai: document.getElementById('val-' + i).value
            }));

            const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "update data",
                    content: btoa(JSON.stringify(baru, null, 2)),
                    sha: file.sha
                })
            });

            if(res.ok) { alert("Berhasil Terupdate!"); location.reload(); }
            else { alert("Gagal Simpan!"); btn.disabled = false; }
        } catch (e) { alert("Error Koneksi"); btn.disabled = false; }
    }

    loadData();
</script>
</body>
</html>
