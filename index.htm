<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fase Selular Pakam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        /* 1. HALAMAN LOGIN MENDATAR (HORIZONTAL) */
        #login-screen {
            background-color: #484b3d;
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .header-box-login { display: flex; gap: 2px; margin-bottom: 10px; }
        .box-gray {
            background: #9fa18a; padding: 12px 25px; color: #1a1a1a;
            font-family: 'Kanit', sans-serif; font-style: italic; font-weight: 800; font-size: 1.8rem;
        }
        .input-dark {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px; width: 220px; outline: none; border-radius: 4px;
        }
        .btn-gold {
            background: #c28a00; color: white; padding: 12px 25px;
            font-weight: bold; border-radius: 4px; text-transform: uppercase;
        }

        /* 2. DASHBOARD BAMBU */
        #dashboard {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1542332213-9b5a5a3fab35?fit=crop&w=1000&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: none; padding: 20px; font-family: 'Orbitron', sans-serif;
        }
        .gold-title {
            color: #facc15; font-family: 'Kanit', sans-serif; font-style: italic;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8); line-height: 1.1;
        }
        .card-stok {
            background: rgba(0, 0, 0, 0.9); border-radius: 12px; padding: 25px;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 550px; margin: 15px auto; border-bottom: 4px solid #111;
        }

        /* ADMIN PANEL */
        #admin-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; z-index: 2000; padding: 20px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- SCREEN LOGIN AWAL (MENDATAR) -->
    <div id="login-screen">
        <div class="header-box-login">
            <div class="box-gray">FASE SELULAR</div>
            <div class="box-gray">PAKAM</div>
        </div>
        <p class="text-[10px] text-white/50 tracking-[4px] mb-12 uppercase italic">Private Access Only</p>
        
        <div class="flex flex-col md:flex-row gap-2 items-center">
            <input type="text" id="u-main" placeholder="Username" class="input-dark text-center">
            <input type="password" id="p-main" placeholder="Password" class="input-dark text-center">
            <button onclick="prosesLogin()" class="btn-gold">MASUK KE DASHBOARD</button>
        </div>
        <p id="err-msg" class="text-red-500 text-[10px] mt-4 hidden italic">Kombinasi Salah!</p>
    </div>

    <!-- SCREEN DASHBOARD (BAMBU) -->
    <div id="dashboard">
        <div class="flex justify-between items-center mb-10">
            <div class="w-10 h-10 border border-white/20 bg-black/30 flex items-center justify-center text-[8px] rounded">LOGO</div>
            <div class="text-center">
                <h2 id="clock" class="text-2xl font-bold tracking-widest text-blue-100">00.00.00</h2>
                <p id="date" class="text-[9px] opacity-60">MINGGU, 21 JUN 2026</p>
            </div>
            <!-- Klik ini muncul PROMPT ID -->
            <button onclick="bukaAdminPrompt()" class="border border-white/40 px-3 py-1 text-[9px] rounded uppercase bg-black/40">LOGIN</button>
        </div>

        <div class="text-center mb-16">
            <h1 class="text-6xl gold-title italic font-bold uppercase">FASE SELULAR</h1>
            <h1 class="text-6xl gold-title italic font-bold mb-4 uppercase">PAKAM</h1>
            <p class="text-[10px] tracking-[0.4em] text-white/70 uppercase">Generasi Peternak Modern</p>
        </div>

        <div id="konten-stok"></div>
    </div>

    <!-- SCREEN UPDATE DATA -->
    <div id="admin-panel">
        <div class="max-w-sm mx-auto pt-10">
            <h2 class="text-yellow-500 font-bold text-center mb-6 uppercase tracking-widest">Update Stok</h2>
            <div class="space-y-2 mb-6 text-white">
                <input type="text" id="gh-u" placeholder="User GitHub" class="w-full p-3 bg-gray-800 rounded text-sm outline-none">
                <input type="text" id="gh-r" placeholder="Repo GitHub" class="w-full p-3 bg-gray-800 rounded text-sm outline-none">
                <input type="password" id="gh-t" placeholder="Token GitHub" class="w-full p-3 bg-gray-800 rounded text-sm outline-none">
            </div>
            <div id="fields-edit" class="space-y-4 mb-6 pt-4 border-t border-white/10"></div>
            <button onclick="gasUpdate()" id="btn-gas" class="w-full bg-yellow-600 p-3 rounded font-bold uppercase text-white">Simpan Perubahan</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full mt-4 text-[10px] opacity-40 text-white">KEMBALI</button>
            <p id="notif" class="text-center text-xs mt-4"></p>
        </div>
    </div>

<script>
    // --- KONFIGURASI ---
    const LOGIN_U = "admin";    // User masuk web
    const LOGIN_P = "12345";    // Pass masuk web
    const ID_ADM  = "pakam01";  // ID prompt login dashboard
    // -------------------

    let stokLocal = [];

    // 1. Login Horizontal
    function prosesLogin() {
        const u = document.getElementById('u-main').value;
        const p = document.getElementById('p-main').value;
        if(u === LOGIN_U && p === LOGIN_P) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            muatData();
        } else {
            document.getElementById('err-msg').classList.remove('hidden');
        }
    }

    // 2. Prompt ID (Gambar 3)
    function bukaAdminPrompt() {
        let ask = prompt("ID:");
        if(ask === ID_ADM) {
            document.getElementById('admin-panel').style.display = 'block';
        } else if(ask !== null) {
            alert("Akses Dilarang!");
        }
    }

    // Jam Realtime
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB').replace(/:/g, '.');
        document.getElementById('date').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short', year:'numeric'}).toUpperCase();
    }, 1000);

    // Muat Data dari data.json
    async function muatData() {
        try {
            const r = await fetch('data.json?v=' + Date.now());
            stokLocal = await r.json();
            
            document.getElementById('konten-stok').innerHTML = stokLocal.map(i => `
                <div class="card-stok shadow-2xl">
                    <span class="text-sm font-bold tracking-widest uppercase text-white/90">${i.nama}</span>
                    <span class="text-4xl font-bold text-white">${i.nilai}</span>
                </div>
            `).join('');

            document.getElementById('fields-edit').innerHTML = stokLocal.map((i, idx) => `
                <div>
                    <label class="text-[9px] opacity-40 uppercase mb-1 block text-white">${i.nama}</label>
                    <input type="text" id="val-${idx}" value="${i.nilai}" class="w-full p-2 bg-gray-700 border border-gray-600 rounded text-sm text-white">
                </div>
            `).join('');
        } catch (e) { console.log("JSON Not Found"); }
    }

    // Update ke GitHub
    async function gasUpdate() {
        const user = document.getElementById('gh-u').value;
        const repo = document.getElementById('gh-r').value;
        const tok  = document.getElementById('gh-t').value;
        if(!user || !repo || !tok) return alert("Lengkapi Data Akun!");

        const btn = document.getElementById('btn-gas');
        btn.disabled = true; btn.innerText = "Saving...";

        try {
            const g = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`);
            const f = await g.json();

            const upd = stokLocal.map((i, idx) => ({
                nama: i.nama,
                nilai: document.getElementById('val-' + idx).value
            }));

            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${tok}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update",
                    content: btoa(JSON.stringify(upd, null, 2)),
                    sha: f.sha
                })
            });

            if(res.ok) { alert("Selesai!"); location.reload(); }
            else { alert("Gagal!"); btn.disabled = false; }
        } catch (e) { alert("Koneksi Putus"); btn.disabled = false; }
    }
</script>
</body>
</html>
