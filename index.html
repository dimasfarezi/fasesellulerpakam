<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Putra Barokah Farm - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1542332213-9b5a5a3fab35?fit=crop&w=1000&q=80');
            background-size: cover; background-attachment: fixed;
            font-family: 'Orbitron', sans-serif; color: white; min-height: 100vh;
        }
        .glass { background: rgba(13, 18, 1, 0.85); border: 1px solid #333; border-radius: 12px; }
        .gold-text { color: #eab308; font-family: 'Kanit', sans-serif; font-style: italic; }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
        <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20">Logo</div>
        <div class="text-center">
            <h2 id="clock" class="text-2xl font-bold tracking-widest text-blue-100">00:00:00</h2>
            <p id="date" class="text-[10px] opacity-60 uppercase">MINGGU, 21 JUN 2026</p>
        </div>
        <button onclick="toggleAdmin()" class="border border-white/40 px-3 py-1 text-[10px] rounded uppercase hover:bg-white/20">LOGIN</button>
    </header>

    <!-- Judul Utama -->
    <div class="text-center mb-8">
        <h1 class="text-4xl gold-text leading-tight">PUTRA BAROKAH</h1>
        <h1 class="text-4xl gold-text mb-2">FARM</h1>
        <p class="text-[9px] tracking-[0.4em] opacity-70 border-t border-white/20 pt-2 inline-block">GENERASI PETERNAK MODERN</p>
    </div>

    <!-- Tampilan Publik (Display Only) -->
    <div id="public-view" class="max-w-md mx-auto space-y-3">
        <div class="text-center italic opacity-50">Memuat data...</div>
    </div>

    <!-- Form Admin (Tersembunyi) -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/90 z-50 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl gold-text">UPDATE STOK</h2>
            <button onclick="toggleAdmin()" class="text-red-500">TUTUP [X]</button>
        </div>
        
        <div class="space-y-4 max-w-sm mx-auto">
            <input type="password" id="gh-token" placeholder="Masukkan Token GitHub Anda" class="w-full p-3 bg-gray-800 rounded border border-gray-600 outline-none">
            <div id="edit-fields" class="space-y-4">
                <!-- Input field akan muncul di sini -->
            </div>
            <button onclick="saveData()" id="btn-save" class="w-full bg-yellow-600 p-3 rounded font-bold hover:bg-yellow-500">SIMPAN PERUBAHAN</button>
            <p id="status" class="text-center text-xs mt-2 text-yellow-400"></p>
        </div>
    </div>

<script>
    // Konfigurasi Repo Anda
    const GITHUB_USER = "USERNAME_ANDA"; // <--- Ganti dengan Username GitHub Anda
    const GITHUB_REPO = "NAMA_REPO_ANDA"; // <--- Ganti dengan Nama Repository Anda
    const FILE_PATH = "data.json";

    let currentData = [];
    let fileSha = "";

    // Jam Realtime
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB').replace(/:/g, '.');
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short', year:'numeric'}).toUpperCase();
    }, 1000);

    // Ambil Data
    async function loadData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`);
            const json = await res.json();
            fileSha = json.sha; // Simpan SHA untuk update nanti
            currentData = JSON.parse(atob(json.content));
            
            renderPublicView();
            renderAdminFields();
        } catch (e) { alert("Gagal ambil data. Cek settingan Repo!"); }
    }

    function renderPublicView() {
        const container = document.getElementById('public-view');
        container.innerHTML = currentData.map(item => `
            <div class="glass flex justify-between items-center p-6 shadow-xl">
                <span class="text-sm font-bold tracking-widest uppercase">${item.label}</span>
                <span class="text-4xl font-bold">${item.value}</span>
            </div>
        `).join('');
    }

    function renderAdminFields() {
        const container = document.getElementById('edit-fields');
        container.innerHTML = currentData.map((item, index) => `
            <div>
                <label class="text-[10px] opacity-50 uppercase">${item.label}</label>
                <input type="text" id="input-${index}" value="${item.value}" class="w-full p-3 bg-gray-700 rounded outline-none border border-gray-600">
            </div>
        `).join('');
    }

    function toggleAdmin() {
        document.getElementById('admin-panel').classList.toggle('hidden');
    }

    async function saveData() {
        const token = document.getElementById('gh-token').value;
        const btn = document.getElementById('btn-save');
        const status = document.getElementById('status');
        
        if (!token) return alert("Token wajib diisi!");

        btn.disabled = true;
        status.innerText = "Sedang menyimpan...";

        // Ambil data baru dari input
        const newData = currentData.map((item, index) => ({
            label: item.label,
            value: document.getElementById(`input-${index}`).value
        }));

        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update data via Admin Web",
                    content: btoa(JSON.stringify(newData, null, 2)),
                    sha: fileSha
                })
            });

            if (res.ok) {
                status.innerText = "✅ BERHASIL DIUPDATE!";
                setTimeout(() => location.reload(), 1500);
            } else {
                status.innerText = "❌ GAGAL! Cek Token Anda.";
            }
        } catch (e) {
            status.innerText = "Terjadi kesalahan koneksi.";
        } finally {
            btn.disabled = false;
        }
    }

    loadData();
</script>
</body>
</html>
