<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Toko Pulsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Gradasi sesuai gambar Anda */
            background: linear-gradient(135deg, #6b1d4f 0%, #4a5d6e 50%, #2d4a4d 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .label-text { font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; color: #e2e8f0; }
        .value-text { font-size: 2.2rem; font-weight: 700; color: white; }
        .gold-title {
            color: #fbbf24;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            font-style: italic;
            line-height: 1.1;
        }
    </style>
</head>
<body class="p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
        <div class="w-10 h-10 border border-white/30 rounded-full flex items-center justify-center text-[8px]">Logo</div>
        <div class="text-center">
            <div id="clock" class="text-2xl font-bold tracking-widest">00:00:00</div>
            <div id="date" class="text-[9px] opacity-80 uppercase">MINGGU, 21 JUN 2026</div>
        </div>
        <button class="text-[9px] border border-white/50 px-3 py-1 rounded uppercase">Login</button>
    </div>

    <!-- Title Area -->
    <div class="text-center mb-12">
        <h1 class="text-3xl gold-title font-bold">REKAP TOKO</h1>
        <h1 class="text-3xl gold-title font-bold mb-2">PULSA & DATA</h1>
        <div class="h-[1px] w-32 bg-white mx-auto mb-1 opacity-50"></div>
        <p class="text-[9px] tracking-[0.3em] opacity-80 uppercase">Pencatatan Stok Modern</p>
    </div>

    <!-- Cards Container -->
    <div id="display-area" class="max-w-md mx-auto">
        <!-- Data dimuat di sini -->
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', options).toUpperCase();
        }
        setInterval(updateTime, 1000);
        updateTime();

        async function fetchData() {
            try {
                // Menambahkan timestamp agar browser tidak mengambil cache lama
                const response = await fetch('data.json?t=' + Date.now());
                const data = await response.json();
                const container = document.getElementById('display-area');
                container.innerHTML = '';
                
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="glass-card">
                            <div class="label-text">${item.nama}</div>
                            <div class="value-text">${item.jumlah}</div>
                        </div>
                    `;
                });
            } catch (e) { console.log("Error load data"); }
        }
        fetchData();
    </script>
</body>
</html>
