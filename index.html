<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fase Selular Pakam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a1c14; /* Background gelap agar elegan */
            font-family: 'Orbitron', sans-serif;
            color: white; min-height: 100vh; margin: 0; padding: 20px;
        }
        .header-box-wrap { display: flex; justify-content: center; gap: 2px; margin-top: 20px; }
        .header-box {
            background: #9fa18a; padding: 10px 20px; color: #333;
            font-family: 'Kanit', sans-serif; font-style: italic; font-weight: 800;
            font-size: 1.8rem; text-transform: uppercase;
        }
        .line-subtitle {
            font-size: 10px; letter-spacing: 4px; margin-top: 10px;
            border-bottom: 1px solid white; display: inline-block; padding-bottom: 5px; opacity: 0.9;
        }
        .card-stok {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px; max-width: 450px; margin-left: auto; margin-right: auto;
        }
        #admin-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; padding: 20px; z-index: 100; overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- Navigasi Atas -->
    <div class="flex justify-between items-center mb-6">
        <div class="text-[8px] border border-white/20 p-1 rounded">V.4.0</div>
        <div class="text-center">
            <h2 id="clock" class="text-xl font-bold tracking-widest text-yellow-500">00.00.00</h2>
            <p id="date" class="text-[9px] opacity-60 uppercase">MINGGU, 21 JUN 2026</p>
        </div>
        <!-- Tombol Login yang akan memicu prompt ID -->
        <button onclick="mintaAkses()" class="border border-white/40 px-3 py-1 text-[9px] rounded uppercase hover:bg-white/10">LOGIN</button>
    </div>

    <!-- Header -->
    <div class="text-center mb-10">
        <div class="header-box-wrap">
            <div class="header-box">FASE SELULAR</div>
            <div class="header-box">PAKAM</div>
        </div>
        <p class="line-subtitle">FASE SELLULAR PAKAM</p>
    </div>

    <!-- Tampilan Utama (Data) -->
    <div id="data-area">
        <p class="text-center italic opacity-30 text-xs">Menghubungkan ke server...</p>
    </div>

    <!-- Panel Admin (Tersembunyi, Muncul jika ID Benar) -->
    <div id="admin-panel">
        <div class="max-w-sm mx-auto pt-6">
            <h2 class="text-center mb-2 text-yellow-500 font-bold uppercase tracking-widest">Mode Admin</h2>
            <p class="text-[10px] text-center mb-8 opacity-50">Masukkan data dengan teliti</p>
            
            <!-- Konfigurasi Repo -->
            <div class="space-y-2 mb-6">
                <input type="text" id="gh-user" placeholder="Username GitHub Anda" class="w-full p-3 bg-gray-800 border border-gray-600 rounded text-white text-sm outline-none">
                <input type="text" id="gh-repo" placeholder="Nama Repository" class="w-full p-3 bg-gray-800 border border-gray-600 rounded text-white text-sm outline-none">
                <input type="password" id="gh-token" placeholder="Token GitHub" class="w-full p-3 bg-gray-800 border border-gray-600 rounded text-white text-sm outline-none">
            </div>
            
            <!-- Input Data Stok (Otomatis muncul di sini) -->
            <div id="form-edit" class="space-y-4 mb-8 pt-4 border-t border-white/10"></div>

            <button onclick="simpanData()" id="btn-save" class="w-full bg-yellow-600 p-4 rounded font-bold uppercase tracking-widest text-sm hover:bg-yellow-500">Simpan Perubahan</button>
            <button onclick="tutupAdmin()" class="w-full mt-6 text-[10px] opacity-40 uppercase tracking-widest">Kembali</button>
            <p id="status" class="text-center text-xs mt-4"></p>
        </div>
    </div>

<script>
    // --- PENGATURAN ID AKSES ---
    const ID_RAHASIA = "admin123"; // <--- Ganti ini dengan ID yang kakak inginkan
    // ---------------------------

    let dataStok = [];

    // Fungsi Minta Akses (Prompt ID)
    function mintaAkses() {
        let inputID = prompt("ID:"); // Ini memunculkan kotak seperti gambar kedua kakak
        
        if (inputID === null) return; // Jika klik cancel
        
        if (inputID === ID_RAHASIA) {
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("ID Salah! Akses Ditolak.");
        }
    }

    function tutupAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    // Jam Realtime
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB').replace(/:/g, '.');
        document.getElementById('date').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short', year:'numeric'}).toUpperCase();
    }, 1000);

    // Ambil Data dari GitHub
    async function loadData() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            if(!res.ok) throw new Error();
            dataStok = await res.json();
            
            renderDashboard();
            renderFormAdmin();
        } catch (e) {
            document.getElementById('data-area').innerHTML = "<p class='text-center text-red-500 text-[10px]'>Gagal memuat data.json. Pastikan file tersedia di repo.</p>";
        }
    }

    function renderDashboard() {
        document.getElementById('data-area').innerHTML = dataStok.map(item => `
            <div class="card-stok">
                <span class="text-[10px] font-bold tracking-widest opacity-60 uppercase">${item.nama}</span>
                <span class="text-3xl font-bold">${item.nilai}</span>
            </div>
        `).join('');
    }

    function renderFormAdmin() {
        document.getElementById('form-edit').innerHTML = dataStok.map((item, i) => `
            <div>
                <label class="text-[9px] opacity-50 uppercase mb-1 block">${item.nama}</label>
                <input type="text" id="inp-${i}" value="${item.nilai}" class="w-full p-3 bg-[#2d3025] border border-gray-600 rounded text-white text-sm font-bold">
            </div>
        `).join('');
    }

    async function simpanData() {
        const user = document.getElementById('gh-user').value;
        const repo = document.getElementById('gh-repo').value;
        const token = document.getElementById('gh-token').value;
        
        if(!user || !repo || !token) return alert("Lengkapi Username, Repo, dan Token!");

        const btn = document.getElementById('btn-save');
        const stat = document.getElementById('status');
        btn.disabled = true; stat.innerText = "Mengunggah data...";

        try {
            const getFile = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`);
            const fileData = await getFile.json();

            const dataBaru = dataStok.map((item, i) => ({
                nama: item.nama,
                nilai: document.getElementById('inp-' + i).value
            }));

            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update stok via Dashboard",
                    content: btoa(JSON.stringify(dataBaru, null, 2)),
                    sha: fileData.sha
                })
            });

            if(res.ok) {
                stat.innerText = "✅ BERHASIL! Me-refresh...";
                setTimeout(() => location.reload(), 1500);
            } else {
                stat.innerText = "❌ GAGAL! Periksa kembali Token/Akses Repo.";
                btn.disabled = false;
            }
        } catch (e) {
            stat.innerText = "Error: Hubungkan ke Internet atau Cek Nama Repo.";
            btn.disabled = false;
        }
    }

    loadData();
</script>
</body>
</html>
